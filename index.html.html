<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #eef2ff;
        --card: #ffffff;
        --border: rgba(0,0,0,0.08);
        --accent: #5b8dee;
        --text: #1a1f36;
        --muted: #6b7280;
        --input-bg: #f4f6fb;
        --left-bg: #dce8ff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg);
        font-family: 'DM Sans', sans-serif;
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        width: 750px;
        max-width: 95vw;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        display: flex;
        overflow: hidden;
    }

   
    .left {
        width: 50%;
        background: var(--left-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 50px 30px;
        text-align: center;
    }

    .left img {
        width: 300px;
        height: 300px;
    }

    .left h1 {
        font-family: 'DM Serif Display', serif;
        color: var(--text);
        font-size: 22px;
        margin-top: 18px;
    }

    .left p {
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
        line-height: 1.6;
    }

    
    .right {
        width: 50%;
        padding: 50px 40px;
    }

    h2 {
        font-family: 'DM Serif Display', serif;
        font-size: 30px;
        color: var(--text);
        margin-bottom: 8px;
    }

    .subtitle {
        font-size: 15px;
        color: var(--muted);
        margin-bottom: 35px;
    }

    .field {
        margin-bottom: 22px;
    }

    label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.7px;
    }

    input {
        width: 100%;
        padding: 14px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 16px;
        outline: none;
    }

    input:focus {
        border-color: var(--accent);
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #4a7de0;
    }

    .signup {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        margin-top: 22px;
    }

    .signup a {
        color: var(--accent);
        text-decoration: none;
    }

    @media (max-width: 520px) {
        .card { flex-direction: column; }
        .left, .right { width: 100%; }
        .left { padding: 30px 20px; }
        .left img { width: 80px; height: 80px; }
        .right { padding: 30px 24px; }
    }
</style>
</head>

<body>

<div class="card">

    
    <div class="left">
        <img src="Logo.png" alt="School Logo"/>
        <h1>EduPortal</h1>
        <p>A building with four walls<br/>and tomorrow inside.</p>
    </div>

   
    <div class="right">
        <h2>Login</h2>
        <p class="subtitle">Sign in to continue</p>

        <form onsubmit="login(event)">
            <div class="field">
                <label>Username</label>
                <input type="text" id="username">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="password">
            </div>

            <button type="submit">Sign in</button>
        </form>

        <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </div>

</div>

<script>
    var CorrectUser = "Student17";
    var CorrectPass = "EduPortalStudent17";

    var attempts = 0;
    var MaxTry = 3;

    function login(event) {
        event.preventDefault();

        var User = document.getElementById("username").value;
        var Pass = document.getElementById("password").value;

        if (attempts < MaxTry) {
            if (User === CorrectUser && Pass === CorrectPass) {
                alert("Login successful!");
            } else {
                attempts++;
                alert("Incorrect username or password. Attempts left: " + (MaxTry - attempts));
            }
        }

        if (attempts === MaxTry) {
            alert("Account locked. Please try again later.");
        }
    }
</script>

</body>
</html>
